<app-card class="project-card">
  <article class="project-content">

    <!-- Header -->
    <header class="project-header">
      <div class="header-top">
        <h2 class="project-title">{{ project.title }}</h2>
        <menu>
          <button class="primary-btn" (click)="openProjDescModal()">
            <span>View Details</span>
          </button>
        </menu>
      </div>

      <div class="project-meta">
        <span class="date">
          {{ project.startDate | date:'MMM yyyy' }}
        </span>

        <span class="separator">–</span>

        <span class="date">
          {{ project.endDate ? (project.endDate | date:'MMM yyyy') : 'Present' }}
        </span>
      </div>
    </header>

    <!-- Technologies -->
    <section class="project-section">
      <h4 class="section-title">Technologies</h4>

      <div class="technologies">
        <span 
          class="tech-badge"
          *ngFor="let tech of project.technologies">
          {{ tech }}
        </span>
      </div>
    </section>

    <!-- Responsibilities -->
    <section class="project-section">
      <h4 class="section-title">Key Responsibilities</h4>

      <ul class="responsibilities">
        <li *ngFor="let resp of project.responsibilities">
          <span class="bullet">•</span>
          <span class="resp-text">{{ resp }}</span>
        </li>
      </ul>
    </section>

  </article>
</app-card>

<app-proj-desc
  [isOpen]="isProjDescModalOpen"
  [title]="project.title"
  [desc]="project.desc"
  (close)="isProjDescModalOpen = false">
</app-proj-desc>
