<app-header />

<main class="main-layout">

  <!-- Company list / sidebar -->
  <aside class="company-list-container">
    <ul id="company" class="company-list">
      @for (company of companies; track company.id) {
        <li>
          <app-company
            [company]="company"
            [selected]="company.id === selectedCompanyId"
            (select)="onSelectCompany($event)"
          />
        </li>
      }
    </ul>
  </aside>

  <!-- Projects / main content -->
  <section class="projects-container">
    @if (selectedCompany) {
      <app-projects
        [duration]="selectedCompany.duration"
        [companyId]="selectedCompany.id"
        [name]="selectedCompany.name"
      />
    } @else {
      <p id="fallback">Select a company to see projects!</p>
    }
  </section>

</main>
